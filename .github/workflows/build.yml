name: Build Android Mod
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r21e
      - name: Build with ndk-build
        run: ndk-build -C app/src/main/jni
      - name: Upload Library
        uses: actions/upload-artifact@v4
        with:
          name: ModMenu_Library
          path: app/src/main/libs/  # Ajusta esta ruta según donde veas en los logs que se guardó
